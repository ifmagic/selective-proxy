<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Selective Proxy</title>
  <style>
    :root {
      --primary-color: #4CAF50;
      --primary-hover: #45a049;
      --background-color: #f3f5f7;
      --card-background: #ffffff;
      --border-color: #dde3e8;
      --text-color: #24303a;
      --text-light: #6a7782;
      --error-color: #f44336;
      --success-color: #4CAF50;
      --shadow: 0 10px 24px rgba(35, 48, 58, 0.08);
      --shadow-soft: inset 0 1px 0 rgba(255, 255, 255, 0.75);
      --border-radius: 14px;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 380px;
      padding: 18px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background:
        radial-gradient(circle at top right, rgba(76, 175, 80, 0.12), transparent 30%),
        var(--background-color);
      color: var(--text-color);
    }
    
    h2 {
      text-align: center;
      margin-bottom: 18px;
      color: var(--text-color);
      font-size: 17px;
      letter-spacing: 0.01em;
    }
    
    .card {
      background-color: var(--card-background);
      border-radius: var(--border-radius);
      padding: 16px;
      margin-bottom: 14px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(221, 227, 232, 0.8);
    }

    .card-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .card-title-text {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-color);
    }

    .form-group {
      margin-bottom: 16px;
    }
    
    .form-group:last-child {
      margin-bottom: 0;
    }
    
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
      font-size: 14px;
      color: var(--text-light);
    }
    
    input {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid var(--border-color);
      border-radius: 10px;
      font-size: 14px;
      transition: border-color 0.2s, box-shadow 0.2s, background-color 0.2s;
      background-color: #fbfcfd;
    }
    
    input:focus {
      outline: none;
      border-color: var(--primary-color);
      box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.12);
      background-color: #ffffff;
    }

    input.invalid {
      border-color: var(--error-color);
      box-shadow: 0 0 0 3px rgba(244, 67, 54, 0.12);
    }
    
    .domain-input-container {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    
    .domain-input-container input {
      flex: 1;
    }
    
    .add-domain-btn {
      min-width: 46px;
      background-color: var(--primary-color);
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 18px;
      font-weight: 600;
      transition: background-color 0.2s, transform 0.2s;
    }
    
    .add-domain-btn:hover {
      background-color: var(--primary-hover);
      transform: translateY(-1px);
    }
    
    .domain-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }
    
    .domain-item {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      max-width: 100%;
      padding: 8px 10px 8px 12px;
      background-color: #f7f9fb;
      border-radius: 999px;
      font-size: 13px;
      line-height: 1;
      border: 1px solid rgba(221, 227, 232, 0.9);
      box-shadow: var(--shadow-soft);
    }

    .domain-chip-text {
      color: var(--text-color);
      font-weight: 500;
      max-width: 240px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    
    .remove-domain-btn {
      background-color: transparent;
      border: none;
      color: var(--error-color);
      cursor: pointer;
      font-size: 16px;
      padding: 0;
      line-height: 1;
      position: relative;
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }
    
    .remove-domain-btn::before,
    .remove-domain-btn::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 12px;
      height: 2px;
      background-color: var(--error-color);
      transform: translate(-50%, -50%);
    }
    
    .remove-domain-btn::before {
      transform: translate(-50%, -50%) rotate(45deg);
    }
    
    .remove-domain-btn::after {
      transform: translate(-50%, -50%) rotate(-45deg);
    }
    
    .remove-domain-btn:hover {
      opacity: 0.75;
    }
    
    .toggle-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .toggle-label {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-color);
    }

    .toggle-status {
      font-size: 12px;
      color: var(--text-light);
      margin-top: 4px;
    }

    .status-card {
      display: grid;
      gap: 10px;
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-size: 13px;
      padding: 8px 0;
      border-bottom: 1px solid rgba(221, 227, 232, 0.7);
    }

    .status-row.stack {
      display: grid;
      gap: 6px;
      align-items: stretch;
    }

    .status-row:last-child {
      border-bottom: none;
      padding-bottom: 0;
    }

    .status-name {
      color: var(--text-light);
      flex-shrink: 0;
    }

    .status-value {
      color: var(--text-color);
      font-weight: 500;
      text-align: right;
      word-break: break-word;
      line-height: 1.4;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 68px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.03em;
    }

    .status-badge.clear {
      background-color: rgba(244, 67, 54, 0.12);
      color: var(--error-color);
    }

    .status-badge.pac {
      background-color: rgba(76, 175, 80, 0.12);
      color: var(--success-color);
    }

    .status-badge.unknown {
      background-color: rgba(51, 51, 51, 0.08);
      color: var(--text-light);
    }

    .toggle-switch {
      position: relative;
      width: 44px;
      height: 24px;
      flex-shrink: 0;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }

    .toggle-slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #ccc;
      border-radius: 24px;
      transition: background-color 0.2s;
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      height: 18px;
      width: 18px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle-switch input:checked + .toggle-slider {
      background-color: var(--primary-color);
    }

    .toggle-switch input:checked + .toggle-slider::before {
      transform: translateX(20px);
    }

    #saveButton {
      width: 100%;
      padding: 12px;
      background-color: var(--primary-color);
      color: white;
      border: none;
      border-radius: var(--border-radius);
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      transition: background-color 0.2s, transform 0.2s;
      margin-top: 6px;
      box-shadow: var(--shadow-soft);
    }
    
    #saveButton:hover {
      background-color: var(--primary-hover);
      transform: translateY(-1px);
    }
    
    #status {
      margin-top: 16px;
      padding: 10px;
      border-radius: 4px;
      text-align: center;
      font-size: 14px;
    }
    
    .success {
      background-color: rgba(76, 175, 80, 0.1);
      color: var(--success-color);
      border: 1px solid rgba(76, 175, 80, 0.3);
    }
    
    .error {
      background-color: rgba(244, 67, 54, 0.1);
      color: var(--error-color);
      border: 1px solid rgba(244, 67, 54, 0.3);
    }

    .field-error {
      min-height: 18px;
      margin-top: 8px;
      font-size: 12px;
      color: var(--error-color);
      line-height: 1.4;
    }
    
    /* Scrollbar styling */
    .domain-list::-webkit-scrollbar {
      width: 6px;
    }
    
    .domain-list::-webkit-scrollbar-track {
      background: #f1f1f1;
      border-radius: 3px;
    }
    
    .domain-list::-webkit-scrollbar-thumb {
      background: #c1c1c1;
      border-radius: 3px;
    }
    
    .domain-list::-webkit-scrollbar-thumb:hover {
      background: #a1a1a1;
    }
  </style>
</head>
<body>
  <h2>Selective Proxy</h2>

  <div class="card toggle-card">
    <div>
      <div class="toggle-label">Proxy</div>
      <div class="toggle-status" id="toggleStatus">Loading...</div>
    </div>
    <label class="toggle-switch">
      <input type="checkbox" id="proxyToggle">
      <span class="toggle-slider"></span>
    </label>
  </div>

  <div class="card status-card">
    <div class="card-title">
      <span class="card-title-text">Runtime Status</span>
    </div>
    <div class="status-row">
      <span class="status-name">Current Mode</span>
      <span class="status-badge unknown" id="currentMode">UNKNOWN</span>
    </div>
    <div class="status-row">
      <span class="status-name">Current Hostname</span>
      <span class="status-value" id="currentHostname">-</span>
    </div>
    <div class="status-row">
      <span class="status-name">Reason</span>
      <span class="status-value" id="currentReason">Loading...</span>
    </div>
    <div class="status-row stack">
      <span class="status-name">Last Error</span>
      <span class="status-value" id="lastError">-</span>
    </div>
  </div>

  <div class="card">
    <div class="card-title">
      <span class="card-title-text">Proxy Server</span>
    </div>
    <div class="form-group">
      <input type="text" id="proxyServer" placeholder="e.g., 127.0.0.1:7890">
    </div>
  </div>
  
  <div class="card">
    <div class="form-group">
      <div class="card-title">
        <span class="card-title-text">Whitelisted Domains</span>
      </div>
      <div class="domain-input-container">
        <input type="text" id="newDomain" placeholder="Add a domain">
        <button class="add-domain-btn" id="addDomainBtn">+</button>
      </div>
      <div class="field-error" id="domainError"></div>
      <div class="domain-list" id="domainList"></div>
    </div>
  </div>
  
  <button id="saveButton">Save & Apply</button>
  <div id="status"></div>
  
  <script src="popup.js"></script>
</body>
</html>
